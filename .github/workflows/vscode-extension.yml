name: VS Code Extension

on:
  push:
    branches: ["main"]
    paths:
      - "apps/vscode/**"
      - "packages/shared/**"
      - "packages/validators/**"
  workflow_dispatch:
    inputs:
      publish:
        description: "Publish to VS Code Marketplace"
        required: false
        default: true
        type: boolean

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  FORCE_COLOR: 3
  TURBO_TEAM: ${{ vars.TURBO_TEAM }}
  TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}

jobs:
  build-and-publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Setup
        uses: ./tooling/github/setup

      - name: Get extension version
        id: version
        run: |
          VERSION=$(node -p "require('./apps/vscode/package.json').version")
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Extension version: $VERSION"

      - name: Test extension
        run: pnpm --filter kodo test

      - name: Build extension
        run: pnpm --filter kodo package

      - name: Find VSIX file
        id: vsix
        run: |
          VSIX_PATH=$(find apps/vscode/.build -name "*.vsix" | head -1)
          VSIX_NAME=$(basename $VSIX_PATH)
          echo "path=$VSIX_PATH" >> $GITHUB_OUTPUT
          echo "name=$VSIX_NAME" >> $GITHUB_OUTPUT
          echo "Found VSIX: $VSIX_PATH"

      - name: Upload VSIX artifact
        uses: actions/upload-artifact@v4
        with:
          name: kodo-vscode-extension
          path: ${{ steps.vsix.outputs.path }}
          retention-days: 90

      - name: Check if release exists
        id: check_release
        run: |
          TAG="vscode-v${{ steps.version.outputs.version }}"
          if gh release view "$TAG" > /dev/null 2>&1; then
            echo "exists=true" >> $GITHUB_OUTPUT
          else
            echo "exists=false" >> $GITHUB_OUTPUT
          fi
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create GitHub Release
        if: steps.check_release.outputs.exists == 'false'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: vscode-v${{ steps.version.outputs.version }}
          name: Kodo VS Code Extension v${{ steps.version.outputs.version }}
          body: |
            ## Kodo VS Code Extension v${{ steps.version.outputs.version }}

            ### Installation Options

            **Option 1: VS Code Marketplace** (Recommended)
            - Search for "Kodo" in VS Code Extensions
            - Or visit the [VS Code Marketplace](https://marketplace.visualstudio.com/items?itemName=usmangurowa.kodo)

            **Option 2: Manual Install**
            1. Download the `.vsix` file below
            2. In VS Code, open Command Palette (`Cmd+Shift+P` / `Ctrl+Shift+P`)
            3. Run "Extensions: Install from VSIX..."
            4. Select the downloaded file
          files: ${{ steps.vsix.outputs.path }}
          draft: false
          prerelease: false

      - name: Publish to VS Code Marketplace
        if: ${{ github.event_name == 'push' || github.event.inputs.publish == 'true' }}
        run: pnpm vsce publish --no-dependencies -p ${{ secrets.VSCE_PAT }}
        working-directory: apps/vscode
        continue-on-error: true
